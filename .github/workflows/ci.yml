name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npx vitest run --reporter=verbose

  visual-qa:
    name: Visual QA (Playwright)
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SESSION_SECRET: ci-test-secret-not-for-prod
      VISUAL_TEST_USER: visual-qa@parleh.test
      VISUAL_TEST_PASS: qa-test-password-123
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start dev server
        run: npm run dev &
        
      - name: Wait for server
        run: npx wait-on http://localhost:5000 --timeout 30000

      - name: Run Playwright visual QA
        run: npx playwright test --reporter=json > reports/playwright-results.json || true

      - name: Upload screenshots as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-qa-screenshots-${{ github.run_number }}
          path: tests/visual/output/
          retention-days: 30

      - name: Upload Playwright results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results-${{ github.run_number }}
          path: reports/playwright-results.json
          retention-days: 30
