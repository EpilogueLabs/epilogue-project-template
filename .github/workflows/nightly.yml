name: Nightly Visual Regression

on:
  schedule:
    - cron: '0 7 * * *'  # 2am EST daily
  workflow_dispatch:      # allow manual trigger

jobs:
  visual-regression:
    name: Baseline Regression Check
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SESSION_SECRET: ci-test-secret-not-for-prod
      VISUAL_TEST_USER: visual-qa@parleh.test
      VISUAL_TEST_PASS: qa-test-password-123
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Start dev server
        run: npm run dev &

      - name: Wait for server
        run: npx wait-on http://localhost:5000 --timeout 30000

      - name: Run visual regression against baselines
        id: regression
        run: |
          npx playwright test 2>&1 | tee /tmp/playwright-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload regression screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-regression-${{ github.run_number }}
          path: tests/visual/output/
          retention-days: 7

      - name: Open issue on regression failure
        if: steps.regression.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const output = require('fs').readFileSync('/tmp/playwright-output.txt', 'utf8');
            const failures = output.match(/\d+ failed/)?.[0] || 'unknown failures';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Visual Regression] Nightly check failed — ${failures}`,
              body: `## Nightly visual regression detected\n\n**Run:** ${context.runNumber}\n**Date:** ${new Date().toISOString()}\n\n\`\`\`\n${output.slice(-2000)}\n\`\`\`\n\nPlease review screenshots in the [Actions artifacts](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              labels: ['bug', 'visual', 'priority: high']
            });
